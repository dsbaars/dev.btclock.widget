name: "Debug APK"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:java-tools-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        shell: bash
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
          CMDLINE_TOOLS_VERSION: "11076708"
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends curl unzip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL -o tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          unzip -q tools.zip
          mv cmdline-tools latest
          rm tools.zip
          # Heredoc avoids SIGPIPE that `yes |` triggers under pipefail
          # when sdkmanager closes stdin after accepting all licenses.
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null <<EOF
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          y
          EOF
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Lint (ktlint + Android Lint)
        run: ./gradlew ktlintCheck

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - uses: https://code.forgejo.org/forgejo/upload-artifact@v5
        with:
          name: btclock-widget-debug-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
