name: Build APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No RELEASE_KEYSTORE_BASE64 secret set; release APK will be unsigned."
            exit 0
          fi
          mkdir -p keystore
          printf '%s' "$KEYSTORE_B64" | base64 -d > keystore/release.jks
          {
            echo "releaseStoreFile=keystore/release.jks"
            echo "releaseStorePassword=$KEYSTORE_PASSWORD"
            echo "releaseKeyAlias=$KEY_ALIAS"
            echo "releaseKeyPassword=$KEY_PASSWORD"
          } >> local.properties

      - name: Build APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: btclock-widget-debug-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: btclock-widget-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
