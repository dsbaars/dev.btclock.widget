name: Build APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v6

      - name: Lint (ktlint + Android Lint)
        run: ./gradlew ktlintCheck

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          set_count=0
          for v in KEYSTORE_B64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            [ -n "${!v}" ] && set_count=$((set_count + 1))
          done
          if [ "$set_count" -eq 0 ]; then
            echo "No release signing secrets set; release APK will be unsigned."
            exit 0
          fi
          if [ "$set_count" -ne 4 ]; then
            echo "::error::Partial release signing config. Set all four secrets:"
            echo "  RELEASE_KEYSTORE_BASE64  ($([ -n "$KEYSTORE_B64" ] && echo set || echo MISSING))"
            echo "  RELEASE_KEYSTORE_PASSWORD ($([ -n "$KEYSTORE_PASSWORD" ] && echo set || echo MISSING))"
            echo "  RELEASE_KEY_ALIAS         ($([ -n "$KEY_ALIAS" ] && echo set || echo MISSING))"
            echo "  RELEASE_KEY_PASSWORD      ($([ -n "$KEY_PASSWORD" ] && echo set || echo MISSING))"
            exit 1
          fi
          mkdir -p keystore
          # Strip whitespace from the base64 payload so newline-wrapped
          # output from `base64 -i` on macOS still decodes cleanly.
          printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > keystore/release.jks
          if [ ! -s keystore/release.jks ]; then
            echo "::error::Decoded keystore is empty — RELEASE_KEYSTORE_BASE64 is not valid base64."
            exit 1
          fi
          {
            echo "releaseStoreFile=keystore/release.jks"
            echo "releaseStorePassword=$KEYSTORE_PASSWORD"
            echo "releaseKeyAlias=$KEY_ALIAS"
            echo "releaseKeyPassword=$KEY_PASSWORD"
          } >> local.properties

      - name: Build APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - uses: actions/upload-artifact@v7
        with:
          name: btclock-widget-debug-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: btclock-widget-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
